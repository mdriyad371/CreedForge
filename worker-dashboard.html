<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreedForge - Worker Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0a0f; --pink: #ec4899; --blue: #06b6d4; --text: #ffffff; --text-secondary: #94a3b8; --card-bg: #1a1a2e; --border: #1e293b; --navbar-height: 70px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .navbar { background:#0f0f1a; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; height:var(--navbar-height); display:flex; align-items:center; }
        .navbar-container { max-width:1200px; margin:0 auto; width:100%; padding:0 24px; display:flex; justify-content:space-between; align-items:center; }
        .logo { font-size:24px; font-weight:800; letter-spacing:-0.5px; text-decoration:none; color: white; }
        .logo-highlight { background: linear-gradient(135deg, #ec4899, #06b6d4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .nav-links { display:flex; align-items:center; gap:8px; }
        .nav-link { padding:10px 16px; border-radius:8px; color:var(--text-secondary); font-weight:500; cursor:pointer; transition:0.2s; font-size:15px; background:transparent; border:none; font-family:inherit; }
        .nav-link:hover { background:rgba(255,255,255,0.05); color:white; }
        .nav-link.active { background:rgba(236,72,153,0.15); color:var(--pink); }
        .btn-logout { padding:10px 16px; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--text-secondary); cursor:pointer; font-weight:500; font-size:14px; transition:0.2s; font-family:inherit; margin-left:8px; }
        .btn-logout:hover { border-color:var(--pink); color:var(--pink); }
        .menu-toggle { display:none; background:transparent; border:1px solid var(--border); color:white; font-size:20px; cursor:pointer; padding:8px 12px; border-radius:8px; }
        .mobile-menu { display:none; position:absolute; top:var(--navbar-height); left:0; right:0; background:#0f0f1a; border-bottom:1px solid var(--border); flex-direction:column; padding:16px 24px; gap:8px; z-index:49; }
        .mobile-menu.open { display:flex; }
        .main-content { max-width:1200px; margin:0 auto; padding:40px 24px; }
        .tab-content { display:none; } .tab-content.active { display:block; }
        .page-title { font-size:26px; font-weight:700; margin-bottom:28px; color:var(--text); }
        .stats-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:20px; margin-bottom:28px; }
        .stat-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; padding:22px 20px; }
        .stat-label { font-size:13px; color:var(--text-secondary); margin-bottom:6px; }
        .stat-value { font-size:26px; font-weight:700; color:var(--text); }
        .stat-value.pink { color:var(--pink); }
        .glass-card { background:var(--card-bg); border:1px solid var(--border); border-radius:14px; padding:24px; margin-bottom:20px; }
        .card-title { font-size:16px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; color:var(--text); }
        .worker-payout-box { background:rgba(255,255,255,0.03); border-radius:12px; padding:16px; text-align:center; }
        .job-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:18px; display:flex; flex-direction:column; gap:10px; transition:0.2s; margin-bottom:12px; }
        .job-card:hover { border-color:var(--pink); background:rgba(236,72,153,0.03); }
        .job-card-row { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:6px; }
        .job-card-label { font-size:12px; color:var(--text-secondary); text-transform:uppercase; letter-spacing:0.5px; min-width:70px; }
        .job-card-value { font-size:14px; font-weight:600; color:var(--text); word-break:break-word; text-align:right; flex:1; }
        .status-badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
        .status-assigned { background:rgba(59,130,246,0.15); color:#60a5fa; }
        .countdown { font-weight:600; color:#fbbf24; }
        .btn-sm { padding:8px 16px; border-radius:6px; font-weight:500; cursor:pointer; font-size:13px; transition:0.2s; font-family:inherit; border:none; }
        .btn-accept { background:var(--pink); color:white; } .btn-accept:disabled { opacity:0.4; cursor:not-allowed; background:#666; }
        .btn-submit { background:transparent; border:1px solid var(--blue); color:var(--blue); }
        .btn-view { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
        .btn-view:hover { border-color: var(--pink); color: var(--pink); }
        .profile-header { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
        .profile-avatar { width:80px; height:80px; border-radius:50%; background:linear-gradient(135deg, #ec4899, #8b5cf6); display:flex; align-items:center; justify-content:center; font-size:34px; font-weight:700; color:white; flex-shrink:0; }
        .detail-row { display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.04); flex-wrap:wrap; }
        .detail-label { color:var(--text-secondary); font-weight:500; min-width:110px; }
        .amount-highlight { color:var(--pink); font-weight:700; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; margin-bottom:6px; color:var(--text-secondary); font-size:13px; }
        .form-group input, .form-group textarea { width:100%; padding:12px 14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; color:white; outline:none; font-family:inherit; }
        .btn-primary { padding:12px 28px; background:var(--pink); border:none; border-radius:8px; color:white; font-weight:600; cursor:pointer; font-size:14px; font-family:inherit; transition:0.2s; }
        .btn-primary:hover { background:#db2777; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:100; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal-box { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:30px; max-width:480px; width:90%; }
        .modal-title { font-size:22px; font-weight:700; margin-bottom:12px; }
        .btn-close { margin-top:16px; padding:8px 22px; border:1px solid var(--border); border-radius:6px; background:transparent; color:white; cursor:pointer; }
        @media (max-width:768px) { .nav-links { display:none; } .menu-toggle { display:block; } .mobile-menu .nav-link, .mobile-menu .btn-logout { width:100%; text-align:left; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="#" class="logo">⚡ Creed<span class="logo-highlight">Forge</span></a>
            <div class="nav-links">
                <button class="nav-link active" data-tab="dashboard">Dashboard</button>
                <button class="nav-link" data-tab="myjob">My Job</button>
                <button class="nav-link" data-tab="profile">Profile</button>
                <button class="nav-link" data-tab="withdraw">Withdraw</button>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <button class="nav-link active" data-tab="dashboard">Dashboard</button>
            <button class="nav-link" data-tab="myjob">My Job</button>
            <button class="nav-link" data-tab="profile">Profile</button>
            <button class="nav-link" data-tab="withdraw">Withdraw</button>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <div id="dashboardTab" class="tab-content active">
            <h1 class="page-title">Dashboard Overview</h1>
            <div class="stats-grid" id="statsContainer">Loading...</div>
            <div class="glass-card" id="payoutCard"></div>
        </div>

        <div id="myjobTab" class="tab-content">
            <div id="myjobApprovalMessage" class="glass-card" style="text-align:center; padding:40px; display:none;">
                <p style="font-size:18px; color:var(--text-secondary);">Your account is pending admin approval.<br>You can access My Job once approved.</p>
            </div>
            <div id="myjobContent" style="display:none;">
                <h1 class="page-title">My Job</h1>
                <div class="glass-card"><div class="card-title">Available Jobs</div><div id="availableJobsContainer"></div></div>
                <div class="glass-card"><div class="card-title">My Active Job</div><div id="activeJobContainer"><p id="noActiveJobMsg">No active job.</p><div id="activeJobCard" style="display:none;"></div></div></div>
            </div>
        </div>

        <div id="profileTab" class="tab-content">
            <h1 class="page-title">My Profile</h1>
            <div class="glass-card" id="profileInfo">Loading...</div>
            <div class="glass-card" style="margin-top:16px;">
                <div class="card-title" style="cursor:pointer;" onclick="toggleEditProfile()">✏️ Edit Profile</div>
                <div id="editProfileForm" style="display:none; margin-top:12px;">
                    <div class="form-group"><label>Phone Number</label><input type="tel" id="editPhone"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="editEmail"></div>
                    <div class="form-group"><label>Social Media Link</label><input type="url" id="editSocial"></div>
                    <div class="form-group"><label>Profile Photo URL (optional)</label><input type="url" id="editPhotoUrl"></div>
                    <div class="form-group"><label>New Password (optional)</label><input type="password" id="editPassword"></div>
                    <button class="btn-primary" onclick="saveProfile()">Save Changes</button>
                </div>
            </div>
        </div>

        <div id="withdrawTab" class="tab-content">
            <h1 class="page-title">Withdraw Funds</h1>
            <div class="glass-card">
                <div style="display:flex; justify-content:space-between; padding:14px; background:rgba(255,255,255,0.03); border-radius:10px; margin-bottom:18px;">
                    <span style="color:var(--text-secondary);">Available Balance</span>
                    <span style="font-size:22px; font-weight:700; color:var(--pink);" id="availableBalance">৳0</span>
                </div>
                <div class="form-group"><label>Amount (BDT)</label><input type="number" id="wAmount" min="1000" placeholder="Min 1,000"></div>
                <div class="form-group"><label>Mobile Number</label><input type="tel" id="wMobile" placeholder="01XXXXXXXXX"></div>
                <div class="form-group"><label>Payment Method</label><select id="wMethod" style="width:100%; padding:12px; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; color:white;"><option value="">Select</option><option value="bkash">bKash</option><option value="nagad">Nagad</option><option value="bank">Bank Transfer</option></select></div>
                <button class="btn-primary" style="width:100%;" onclick="submitWithdraw()">Submit Request</button>
                <p id="wError" style="color:#f87171; font-size:12px; margin-top:6px; display:none;"></p>
            </div>
            <div class="glass-card" style="margin-top:16px;"><div class="card-title">Withdrawal History</div><div id="withdrawHistoryContainer" style="display:flex; flex-direction:column; gap:12px;"></div></div>
        </div>
    </main>

    <div class="modal-overlay" id="jobDetailModal">
        <div class="modal-box"><div class="modal-title" id="jobDetailTitle"></div><div id="jobDetailContent"></div><button class="btn-close" onclick="closeJobDetailModal()">Close</button></div>
    </div>
    <div class="modal-overlay" id="deliveryModal">
        <div class="modal-box"><div class="modal-title">Submit Delivery</div>
            <div class="form-group"><label>Website Link</label><input type="url" id="deliveryLink" required></div>
            <div class="form-group"><label>Login Credentials (optional)</label><input type="text" id="deliveryCredentials"></div>
            <div class="form-group"><label>Delivery Notes</label><textarea id="deliveryNotes" rows="3"></textarea></div>
            <button class="btn-primary" onclick="submitDelivery()">Confirm Delivery</button>
            <button class="btn-close" style="margin-left:12px;" onclick="closeDeliveryModal()">Cancel</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabase.js"></script>
    <script>
        let currentProfile = null, workerPayoutPercent = 70, deadlineDays = 5, activeJob = null, availableJobs = [];

        async function init() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { window.location.href = 'login.html'; return; }
            const { data: profile } = await supabase.from('profiles').select('*').eq('id', user.id).single();
            if (!profile || profile.role !== 'worker') { alert('Access denied.'); return; }
            currentProfile = profile;

            const { data: settings } = await supabase.from('settings').select('*').single();
            if (settings) {
                workerPayoutPercent = settings.worker_payout || 70;
                deadlineDays = settings.default_deadline || 5;
            }

            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card"><div class="stat-label">Total Income</div><div class="stat-value pink">৳${(profile.total_earned||0).toLocaleString()}</div></div>
                <div class="stat-card"><div class="stat-label">Current Balance</div><div class="stat-value pink">৳${(profile.balance||0).toLocaleString()}</div></div>
                <div class="stat-card"><div class="stat-label">Total Work</div><div class="stat-value">${profile.active_job_count||0}</div></div>
            `;
            document.getElementById('payoutCard').innerHTML = `<div class="card-title">Worker Payout</div><div class="worker-payout-box"><p>You earn <strong style="color:var(--pink);">${workerPayoutPercent}%</strong> of each project.</p></div>`;
            document.getElementById('availableBalance').innerText = '৳' + (profile.balance||0).toLocaleString();

            if (profile.approval_status !== 'approved') {
                document.getElementById('myjobApprovalMessage').style.display = 'block';
                document.getElementById('myjobContent').style.display = 'none';
            } else {
                document.getElementById('myjobApprovalMessage').style.display = 'none';
                document.getElementById('myjobContent').style.display = 'block';
                await loadJobs();
            }
            renderProfileInfo();
            loadWithdrawalHistory();

            // Active job check
            const { data: active } = await supabase.from('orders').select('*').eq('assigned_worker_id', profile.id).in('status', ['assigned','worker_delivered']).single();
            if (active) {
                activeJob = { id: active.id, product: active.product_id, amount: active.amount, deadline: new Date(active.created_at).getTime() + deadlineDays*86400000 };
                renderActiveJob();
            }
        }

        async function loadJobs() {
            const { data } = await supabase.from('orders').select('*, products(name)').eq('status', 'approved_for_worker');
            availableJobs = data || [];
            renderAvailableJobs();
        }

        function renderAvailableJobs() {
            const container = document.getElementById('availableJobsContainer');
            if (!availableJobs.length) { container.innerHTML = '<p style="color:var(--text-secondary);">No jobs available.</p>'; return; }
            container.innerHTML = availableJobs.map(j => `
                <div class="job-card">
                    <div class="job-card-row"><span class="job-card-label">Job</span><span class="job-card-value">${j.products?.name || 'N/A'}</span></div>
                    <div class="job-card-row"><span class="job-card-label">Budget</span><span class="job-card-value">৳${j.amount?.toLocaleString()}</span></div>
                    <div class="job-card-row"><span class="job-card-label">Deadline</span><span class="job-card-value">${deadlineDays} days</span></div>
                    <div class="job-card-row" style="justify-content:flex-end; gap:8px;">
                        <button class="btn-sm btn-view" onclick="viewJobDetails(${j.id})">View Details</button>
                        <button class="btn-sm btn-accept" ${activeJob?'disabled':''} onclick="acceptJob(${j.id})">Accept</button>
                    </div>
                </div>
            `).join('');
        }

        function viewJobDetails(jobId) {
            const j = availableJobs.find(j => j.id === jobId);
            if (!j) return;
            document.getElementById('jobDetailTitle').innerText = j.products?.name || 'Job';
            document.getElementById('jobDetailContent').innerHTML = `<p><strong>Budget:</strong> ৳${j.amount?.toLocaleString()}</p><p style="color:var(--pink);">You'll earn ৳${Math.round(j.amount*workerPayoutPercent/100).toLocaleString()} (${workerPayoutPercent}%)</p>`;
            document.getElementById('jobDetailModal').classList.add('active');
        }
        function closeJobDetailModal() { document.getElementById('jobDetailModal').classList.remove('active'); }

        async function acceptJob(jobId) {
            if (activeJob) return;
            await supabase.from('orders').update({ assigned_worker_id: currentProfile.id, status: 'assigned' }).eq('id', jobId);
            const job = availableJobs.find(j => j.id === jobId);
            activeJob = { id: jobId, product: job.products?.name, amount: job.amount, deadline: new Date(Date.now() + deadlineDays*86400000) };
            availableJobs = availableJobs.filter(j => j.id !== jobId);
            renderAvailableJobs();
            renderActiveJob();
        }

        function renderActiveJob() {
            const card = document.getElementById('activeJobCard'), noMsg = document.getElementById('noActiveJobMsg');
            if (!activeJob) { card.style.display = 'none'; noMsg.style.display = 'block'; return; }
            card.style.display = 'block'; noMsg.style.display = 'none';
            const remaining = getTimeRemaining(activeJob.deadline);
            card.innerHTML = `<div class="job-card"><div class="job-card-row"><span class="job-card-label">Job</span><span class="job-card-value">${activeJob.product}</span></div><div class="job-card-row"><span class="job-card-label">Budget</span><span class="job-card-value">৳${activeJob.amount?.toLocaleString()}</span></div><div class="job-card-row"><span class="job-card-label">Deadline</span><span class="job-card-value countdown">${remaining}</span></div><div class="job-card-row" style="justify-content:flex-end;"><button class="btn-sm btn-submit" onclick="openDeliveryModal()">Submit Delivery</button></div></div>`;
        }

        function getTimeRemaining(deadline) {
            const distance = new Date(deadline).getTime() - Date.now();
            if (distance <= 0) return 'Expired';
            const d = Math.floor(distance/86400000), h = Math.floor((distance%86400000)/3600000), m = Math.floor((distance%3600000)/60000);
            return `${d}d ${h}h ${m}m`;
        }

        function openDeliveryModal() { document.getElementById('deliveryModal').classList.add('active'); }
        function closeDeliveryModal() { document.getElementById('deliveryModal').classList.remove('active'); }

        async function submitDelivery() {
            const link = document.getElementById('deliveryLink').value.trim();
            if (!link) return alert('Website link required.');
            await supabase.from('orders').update({ status: 'worker_delivered', delivery_link: link, delivery_credentials: document.getElementById('deliveryCredentials').value, delivery_notes: document.getElementById('deliveryNotes').value }).eq('id', activeJob.id);
            alert('Delivery submitted!');
            activeJob = null;
            renderActiveJob();
            closeDeliveryModal();
        }

        function renderProfileInfo() {
            if (!currentProfile) return;
            document.getElementById('profileInfo').innerHTML = `
                <div class="profile-header"><div class="profile-avatar">${currentProfile.name.charAt(0)}</div><div><h2>${currentProfile.name}</h2><p style="color:var(--text-secondary);">Worker</p></div></div>
                <div class="detail-row"><span class="detail-label">Phone</span><span>${currentProfile.phone||'—'}</span></div>
                <div class="detail-row"><span class="detail-label">Email</span><span>${currentProfile.email||'—'}</span></div>
                <div class="detail-row"><span class="detail-label">Social</span><span>${currentProfile.social_media_url||'—'}</span></div>
            `;
            document.getElementById('editPhone').value = currentProfile.phone || '';
            document.getElementById('editEmail').value = currentProfile.email || '';
            document.getElementById('editSocial').value = currentProfile.social_media_url || '';
        }

        function toggleEditProfile() { document.getElementById('editProfileForm').style.display = document.getElementById('editProfileForm').style.display === 'none' ? 'block' : 'none'; }
        async function saveProfile() {
            const updates = { phone: document.getElementById('editPhone').value.trim(), email: document.getElementById('editEmail').value.trim(), social_media_url: document.getElementById('editSocial').value.trim() };
            await supabase.from('profiles').update(updates).eq('id', currentProfile.id);
            Object.assign(currentProfile, updates);
            renderProfileInfo();
            toggleEditProfile();
            alert('Updated!');
        }

        async function submitWithdraw() {
            const amount = parseInt(document.getElementById('wAmount').value);
            if (!amount || amount < 1000 || amount > (currentProfile.balance||0)) return alert('Invalid amount');
            await supabase.from('withdrawals').insert([{ user_id: currentProfile.id, amount, mobile_number: document.getElementById('wMobile').value, payment_method: document.getElementById('wMethod').value }]);
            alert('Submitted!');
        }

        async function loadWithdrawalHistory() {
            const { data } = await supabase.from('withdrawals').select('*').eq('user_id', currentProfile.id).order('created_at', { ascending: false });
            document.getElementById('withdrawHistoryContainer').innerHTML = (data||[]).map(w => `<div class="job-card"><div class="job-card-row"><span class="job-card-label">Amount</span><span class="job-card-value">৳${w.amount}</span></div><div class="job-card-row"><span class="job-card-label">Status</span><span class="status-badge">${w.status}</span></div></div>`).join('');
        }

        const navButtons = document.querySelectorAll('.nav-link[data-tab]');
        const tabs = document.querySelectorAll('.tab-content');
        function switchTab(tabName) {
            navButtons.forEach(b => b.classList.remove('active'));
            tabs.forEach(t => t.classList.remove('active'));
            const btn = document.querySelector(`.nav-link[data-tab="${tabName}"]`);
            if (btn) btn.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            document.getElementById('mobileMenu').classList.remove('open');
        }
        navButtons.forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
        document.querySelectorAll('#mobileMenu .nav-link[data-tab]').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.tab)));
        document.getElementById('menuToggle').addEventListener('click', (e) => { e.stopPropagation(); document.getElementById('mobileMenu').classList.toggle('open'); });

        async function logout() { await supabase.auth.signOut(); window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
