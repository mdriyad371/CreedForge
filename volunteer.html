<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard - Creed Forge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div id="loadingOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0f; z-index:9999; display:flex; align-items:center; justify-content:center;"><div class="spinner"></div></div>
    <div id="appContent" style="display:none;">
        <nav class="navbar"><div class="nav-container"><div class="logo"><i class="fas fa-code-branch"></i><span>Creed<span class="text-pink">Forge</span></span></div><div class="nav-links"><a href="#" onclick="loadVolunteerDashboard()">Home</a><a href="#" onclick="loadProducts()">Products</a><a href="#" onclick="loadVolunteerOrders()">My Orders</a><a href="#" onclick="loadProfile()">Profile</a><a href="#" onclick="loadWithdraw()">Withdraw</a><a href="#" onclick="logout()">Logout</a></div><div class="hamburger" id="hamburger"><i class="fas fa-bars"></i></div></div></nav>
        <div class="mobile-menu" id="mobileMenu"></div>
        <main><div id="volunteerContent" class="dashboard-container"><div class="spinner"></div></div></main>
    </div>
    <script type="module" src="supabase.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module">
        import { requireAuth, logout } from './supabase.js';
        window.logout = logout;
        (async function() {
            const user = await requireAuth(['volunteer']);
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.role !== 'volunteer') { window.location.href = 'unauthorized.html'; return; }
            document.getElementById('loadingOverlay').style.display = 'none';
            document.getElementById('appContent').style.display = 'block';
            loadVolunteerDashboard();
        })();
    </script>
</body>
</html>
