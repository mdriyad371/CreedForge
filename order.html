<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreedForge - Place Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0a0f; --pink: #ec4899; --blue: #06b6d4; --text: #ffffff; --text-secondary: #94a3b8; --card-bg: #1a1a2e; --border: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
        .logo { text-align: center; font-size: 24px; font-weight: 800; margin-bottom: 28px; text-decoration: none; display: block; color: white; }
        .logo-highlight { background: linear-gradient(135deg, #ec4899, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
        .section-title { font-size: 16px; font-weight: 600; color: var(--pink); margin: 16px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display:block; margin-bottom:6px; color:var(--text-secondary); font-size:13px; }
        .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 14px; background: rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; color:white; font-size:15px; outline:none; font-family:inherit; }
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
        .check-group { display:flex; flex-wrap:wrap; gap:20px; margin-top:6px; }
        .check-group label { display:flex; align-items:center; gap:8px; cursor:pointer; }
        .price-tag { color:var(--blue); font-size:14px; margin-left:8px; }
        .selected-product-box { background:rgba(255,255,255,0.03); border-radius:12px; padding:16px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; margin-bottom:16px; }
        .product-highlight-name { font-size:18px; font-weight:600; }
        .product-highlight-price { font-size:22px; font-weight:700; color:var(--pink); }
        .btn-details { padding:8px 20px; border:1px solid var(--pink); border-radius:8px; background:transparent; color:var(--pink); font-weight:600; cursor:pointer; }
        .total-box { margin-top:20px; padding:16px; background:rgba(255,255,255,0.03); border-radius:12px; display:flex; justify-content:space-between; align-items:center; }
        .total-label { font-size:16px; color:var(--text-secondary); }
        .total-amount { font-size:24px; font-weight:700; color:var(--pink); }
        .btn-submit { width:100%; padding:14px; margin-top:12px; background: var(--pink); border:none; border-radius:50px; color:white; font-weight:700; font-size:16px; cursor:pointer; }
        .btn-submit:hover { background:#db2777; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:100; justify-content:center; align-items:center; }
        .modal-overlay.active { display:flex; }
        .modal-box { background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:30px; max-width:480px; width:90%; }
        .modal-title { font-size:22px; font-weight:700; margin-bottom:12px; }
        .modal-desc { color:var(--text-secondary); line-height:1.5; margin-bottom:16px; font-size:14px; }
        .demo-link { color:var(--blue); text-decoration:underline; }
        .btn-close { margin-top:16px; padding:8px 22px; border:1px solid var(--border); border-radius:6px; background:transparent; color:white; cursor:pointer; }
        @media (max-width:600px) { .two-col { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo">⚡ Creed<span class="logo-highlight">Forge</span></a>

        <div class="glass-card" id="orderFormContainer">
            <h2 style="font-size:24px; font-weight:700; margin-bottom:24px;">Place Your Order</h2>

            <div class="section-title">Client Information</div>
            <div class="two-col">
                <div class="form-group"><label>Full Name *</label><input type="text" id="customerName" required></div>
                <div class="form-group"><label>Phone Number *</label><input type="tel" id="customerPhone" required></div>
            </div>
            <div class="two-col">
                <div class="form-group"><label>Email *</label><input type="email" id="customerEmail" required></div>
                <div class="form-group"><label>Facebook Profile URL *</label><input type="url" id="facebookUrl" required></div>
            </div>
            <div class="form-group"><label>Address (optional)</label><input type="text" id="customerAddress"></div>

            <div class="section-title">Selected Product</div>
            <div class="selected-product-box">
                <div>
                    <div class="product-highlight-name" id="selectedProductName">Choose a product</div>
                    <div style="font-size:13px; color:var(--text-secondary);" id="selectedProductDescLine"></div>
                </div>
                <div style="display:flex; align-items:center; gap:12px;">
                    <span class="product-highlight-price" id="selectedProductPrice">৳0</span>
                    <button class="btn-details" id="viewDetailsBtn" disabled onclick="openProductModal()">View Details</button>
                </div>
            </div>
            <select id="productSelect" style="display:none;"></select>

            <div class="two-col">
                <div class="form-group">
                    <label>Domain Extension</label>
                    <select id="domainExt">
                        <option value=".com">.com - BDT 1,390</option>
                        <option value=".xyz">.xyz - BDT 350</option>
                        <option value=".net">.net - BDT 1,200</option>
                        <option value=".org">.org - BDT 1,100</option>
                    </select>
                    <span class="price-tag" id="domainPrice">BDT 1,390</span>
                </div>
                <div class="form-group">
                    <label>Hosting Type</label>
                    <select id="hostingType">
                        <option value="shared">Shared Hosting</option>
                        <option value="vps">VPS</option>
                        <option value="dedicated">Dedicated</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Hosting Duration</label>
                <select id="hostingDuration"></select>
                <span class="price-tag" id="hostingPrice"></span>
            </div>

            <div class="form-group">
                <label>Additional Features</label>
                <div class="check-group">
                    <label><input type="checkbox" value="SEO"> SEO</label>
                    <label><input type="checkbox" value="Payment Gateway"> Payment Gateway</label>
                    <label><input type="checkbox" value="Multilingual"> Multilingual</label>
                </div>
            </div>

            <div class="form-group"><label>Target Pages (optional)</label><input type="text" id="targetPages"></div>
            <div class="form-group"><label>Special Instructions</label><textarea id="specialInstructions" rows="3"></textarea></div>

            <div class="total-box">
                <span class="total-label">Total Cost</span>
                <span class="total-amount" id="totalCost">৳0</span>
            </div>

            <button class="btn-submit" onclick="submitOrder()">Submit Order</button>
        </div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-box">
            <div class="modal-title" id="modalProductName"></div>
            <div class="modal-desc" id="modalProductDesc"></div>
            <p style="margin-bottom:8px;"><strong>Price:</strong> <span id="modalProductPrice" style="color:var(--pink);"></span></p>
            <p><strong>Demo:</strong> <a href="#" target="_blank" id="modalDemoLink" class="demo-link">View Demo</a></p>
            <button class="btn-close" onclick="closeProductModal()">Close</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref') || 'UNKNOWN';
        const productIdFromUrl = urlParams.get('product');

        const products = [
            { id:'1', name:'E-commerce Website', price:15000, desc:'Full online store with cart, checkout, payment gateway.', demo:'https://demo.creedforge.com/ecommerce' },
            { id:'2', name:'Portfolio Site', price:8000, desc:'Stunning personal portfolio.', demo:'https://demo.creedforge.com/portfolio' },
            { id:'3', name:'Blog with SEO', price:12000, desc:'Content blog with SEO tools.', demo:'https://demo.creedforge.com/blog' },
            { id:'4', name:'Business Landing Page', price:10000, desc:'Modern landing page.', demo:'https://demo.creedforge.com/landing' },
            { id:'5', name:'Custom Web Application', price:25000, desc:'Tailor-made web app.', demo:'https://demo.creedforge.com/webapp' },
            { id:'6', name:'Multi-Vendor Marketplace', price:30000, desc:'Advanced marketplace.', demo:'https://demo.creedforge.com/marketplace' }
        ];

        const domainPrices = { '.com':1390, '.xyz':350, '.net':1200, '.org':1100 };
        const hostingRates = { 'shared':100, 'vps':600, 'dedicated':1500 };

        const productSelect = document.getElementById('productSelect');
        productSelect.innerHTML = '<option value="">Choose a product</option>' + products.map(p => `<option value="${p.id}">${p.name} - BDT ${p.price.toLocaleString()}</option>`).join('');

        function updateSelectedDisplay() {
            const pid = productSelect.value;
            const p = products.find(pr => pr.id === pid);
            document.getElementById('selectedProductName').textContent = p ? p.name : 'Choose a product';
            document.getElementById('selectedProductDescLine').textContent = p ? p.desc : '';
            document.getElementById('selectedProductPrice').textContent = p ? '৳ ' + p.price.toLocaleString() : '৳0';
            document.getElementById('viewDetailsBtn').disabled = !p;
        }

        function openProductModal() {
            const p = products.find(pr => pr.id === productSelect.value);
            if (!p) return;
            document.getElementById('modalProductName').textContent = p.name;
            document.getElementById('modalProductDesc').textContent = p.desc;
            document.getElementById('modalProductPrice').textContent = '৳ ' + p.price.toLocaleString();
            document.getElementById('modalDemoLink').href = p.demo;
            document.getElementById('productModal').classList.add('active');
        }
        function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }

        function updateHosting() {
            const type = document.getElementById('hostingType').value;
            const rate = hostingRates[type];
            const durSelect = document.getElementById('hostingDuration');
            durSelect.innerHTML = [1,3,6,12].map(m => `<option value="${m}">${m} Month${m>1?'s':''} - BDT ${(rate*m).toLocaleString()}</option>`).join('');
            updateHostingPrice();
        }
        function updateHostingPrice() {
            const type = document.getElementById('hostingType').value;
            const months = parseInt(document.getElementById('hostingDuration').value);
            document.getElementById('hostingPrice').textContent = months ? `BDT ${(hostingRates[type]*months).toLocaleString()}` : '';
        }
        function updateDomainPrice() {
            document.getElementById('domainPrice').textContent = `BDT ${domainPrices[document.getElementById('domainExt').value].toLocaleString()}`;
        }

        function calculateTotal() {
            const pid = productSelect.value;
            const pp = pid ? products.find(p => p.id === pid).price : 0;
            const dp = domainPrices[document.getElementById('domainExt').value];
            const months = parseInt(document.getElementById('hostingDuration').value);
            const hp = months ? hostingRates[document.getElementById('hostingType').value] * months : 0;
            document.getElementById('totalCost').textContent = `৳ ${(pp+dp+hp).toLocaleString()}`;
        }

        function refreshAll() {
            updateSelectedDisplay();
            updateDomainPrice();
            updateHosting();
            calculateTotal();
        }

        productSelect.addEventListener('change', refreshAll);
        document.getElementById('domainExt').addEventListener('change', refreshAll);
        document.getElementById('hostingType').addEventListener('change', refreshAll);
        document.getElementById('hostingDuration').addEventListener('change', () => { updateHostingPrice(); calculateTotal(); });

        if (productIdFromUrl) productSelect.value = productIdFromUrl;
        refreshAll();

        function submitOrder() {
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            const email = document.getElementById('customerEmail').value.trim();
            const fb = document.getElementById('facebookUrl').value.trim();
            const pid = productSelect.value;
            if (!name || !phone || !email || !fb || !pid) return alert('Please fill all required fields.');
            if (!/^01[3-9]\d{8}$/.test(phone)) return alert('Invalid phone number.');
            alert('Order submitted! (demo)');
        }
    </script>
</body>
</html>
