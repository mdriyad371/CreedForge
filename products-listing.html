<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreedForge - Our Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0a0f;
            --pink: #ec4899;
            --blue: #06b6d4;
            --text: #ffffff;
            --text-secondary: #94a3b8;
            --card-bg: #1a1a2e;
            --border: #1e293b;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Logo Bar */
        .logo-bar {
            text-align: center;
            padding: 24px 0 16px;
        }
        .logo-link {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
            color: white;
            display: inline-block;
        }
        .logo-highlight {
            background: linear-gradient(135deg, #ec4899, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Hero Section */
        .hero { text-align: center; padding: 40px 0 40px; }
        .hero-badge { display: inline-block; padding: 6px 18px; border-radius: 50px; background: rgba(236,72,153,0.1); border: 1px solid rgba(236,72,153,0.3); color: #f9a8d4; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .hero-title { font-size: 42px; font-weight: 800; margin-bottom: 12px; }
        .gradient-text { background: linear-gradient(135deg, #ec4899, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { color: var(--text-secondary); font-size: 16px; max-width: 600px; margin: 0 auto 24px; }
        .hero-stats { display: flex; justify-content: center; gap: 40px; margin-top: 24px; flex-wrap: wrap; }
        .hero-stat { text-align: center; }
        .hero-stat-number { font-size: 24px; font-weight: 700; color: var(--pink); }
        .hero-stat-label { font-size: 13px; color: var(--text-secondary); }

        /* Search & Filter */
        .search-filter { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; align-items: center; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 12px 16px 12px 40px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; font-size: 14px; }
        .search-box span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 18px; border: 1px solid var(--border); border-radius: 50px; background: transparent; color: var(--text-secondary); cursor: pointer; font-weight: 500; font-size: 13px; transition: 0.2s; font-family: inherit; }
        .filter-btn.active, .filter-btn:hover { background: var(--pink); color: white; border-color: var(--pink); }

        /* Product Grid */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-bottom: 40px; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-6px); border-color: var(--pink); box-shadow: 0 8px 30px rgba(236,72,153,0.1); }
        .product-img { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(45deg, rgba(236,72,153,0.2), rgba(6,182,212,0.2)); position: relative; }
        .product-badge { position: absolute; top: 12px; left: 12px; background: var(--pink); color: white; font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .product-heart { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 50%; cursor: pointer; font-size: 18px; transition: 0.2s; }
        .product-heart:hover { background: rgba(236,72,153,0.8); }
        .product-info { padding: 18px; flex: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .product-desc { color: var(--text-secondary); font-size: 13px; line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
        .stars { color: #fbbf24; }
        .rating-text { font-size: 12px; color: var(--text-secondary); }
        .product-price { font-size: 22px; font-weight: 700; color: var(--pink); margin-bottom: 12px; }
        .product-footer { display: flex; gap: 8px; margin-top: auto; }
        .btn-view { flex: 1; text-align: center; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--text); cursor: pointer; font-weight: 500; font-size: 13px; transition: 0.2s; font-family: inherit; }
        .btn-view:hover { border-color: var(--pink); color: var(--pink); }
        .btn-order { flex: 1; text-align: center; padding: 10px; background: var(--pink); border: none; border-radius: 8px; color: white; font-weight: 600; font-size: 13px; text-decoration: none; transition: 0.2s; }
        .btn-order:hover { background: #db2777; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .modal-desc { color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; font-size: 14px; }
        .demo-link { color: var(--blue); text-decoration: underline; }
        .btn-close { margin-top: 16px; padding: 8px 22px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: white; cursor: pointer; font-family: inherit; }
        .btn-close:hover { border-color: var(--pink); }

        @media (max-width: 768px) {
            .hero-title { font-size: 28px; }
            .search-filter { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo Bar -->
        <div class="logo-bar">
            <a href="index.html" class="logo-link">⚡ Creed<span class="logo-highlight">Forge</span></a>
        </div>

        <!-- Hero -->
        <div class="hero">
            <div class="hero-badge">🚀 Trusted by 500+ Clients</div>
            <h1 class="hero-title">Build Your <span class="gradient-text">Dream Website</span> Today</h1>
            <p class="hero-subtitle">Choose from our handcrafted packages. Professional websites delivered fast with dedicated support.</p>
            <div class="hero-stats">
                <div class="hero-stat"><div class="hero-stat-number">250+</div><div class="hero-stat-label">Projects Completed</div></div>
                <div class="hero-stat"><div class="hero-stat-number">98%</div><div class="hero-stat-label">Client Satisfaction</div></div>
                <div class="hero-stat"><div class="hero-stat-number">24/7</div><div class="hero-stat-label">Support</div></div>
            </div>
        </div>

        <!-- Search & Filter -->
        <div class="search-filter">
            <div class="search-box">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search products..." oninput="renderProducts()">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                <button class="filter-btn" onclick="filterProducts('Web', this)">Web</button>
                <button class="filter-btn" onclick="filterProducts('E-commerce', this)">E-commerce</button>
                <button class="filter-btn" onclick="filterProducts('Blog', this)">Blog</button>
                <button class="filter-btn" onclick="filterProducts('Business', this)">Business</button>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="product-grid" id="productGrid"></div>
    </div>

    <!-- Product Detail Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-box">
            <div class="modal-title" id="modalProductName"></div>
            <div class="modal-desc" id="modalProductDesc"></div>
            <p style="margin-bottom:8px;"><strong>Price:</strong> <span id="modalProductPrice" style="color:var(--pink);"></span></p>
            <p><strong>Demo:</strong> <a href="#" target="_blank" id="modalDemoLink" class="demo-link">View Demo</a></p>
            <p style="margin-top:12px;"><strong>Features:</strong> <span id="modalFeatures"></span></p>
            <p style="margin-top:8px;"><strong>Delivery:</strong> <span id="modalDelivery"></span></p>
            <button class="btn-close" onclick="closeProductModal()">Close</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref') || 'UNKNOWN';

        const allProducts = [
            { id:1, name:'E-commerce Website', price:15000, category:'E-commerce', rating:4.9, orders:180, delivery:'5 days', features:['Cart','Checkout','Payment Gateway','Admin Panel'], desc:'Full online store with cart, checkout, payment gateway, and order management.', img:'https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=600&h=350&fit=crop', demo:'https://demo.creedforge.com/ecommerce' },
            { id:2, name:'Portfolio Site', price:8000, category:'Web', rating:4.8, orders:120, delivery:'3 days', features:['Responsive','Gallery','Contact Form','SEO'], desc:'Showcase your work with a stunning personal portfolio. Includes responsive design and contact form.', img:'https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?w=600&h=350&fit=crop', demo:'https://demo.creedforge.com/portfolio' },
            { id:3, name:'Blog with SEO', price:12000, category:'Blog', rating:4.7, orders:160, delivery:'4 days', features:['SEO Tools','Newsletter','Social Sharing','Analytics'], desc:'Content-focused blog with built-in SEO optimization, social media sharing, and newsletter integration.', img:'https://images.unsplash.com/photo-1499750310107-5fef28a66643?w=600&h=350&fit=crop', demo:'https://demo.creedforge.com/blog' },
            { id:4, name:'Business Landing Page', price:10000, category:'Business', rating:4.6, orders:140, delivery:'3 days', features:['A/B Testing','Lead Capture','Analytics','Mobile-First'], desc:'Modern landing page to convert visitors into customers. High-speed, mobile-first, and A/B testing ready.', img:'https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=600&h=350&fit=crop', demo:'https://demo.creedforge.com/landing' },
            { id:5, name:'Custom Web Application', price:25000, category:'Web', rating:4.9, orders:90, delivery:'7 days', features:['Database','Authentication','Admin Panel','API'], desc:'Tailor-made web app with database, user authentication, admin panel, and custom feature development.', img:'https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=600&h=350&fit=crop', demo:'https://demo.creedforge.com/webapp' },
            { id:6, name:'Multi-Vendor Marketplace', price:30000, category:'E-commerce', rating:4.8, orders:60, delivery:'10 days', features:['Vendor Dashboards','Commission System','Ratings','Multi-Currency'], desc:'Advanced marketplace platform with vendor dashboards, commission system, and customer rating features.', img:'https://images.unsplash.com/photo-1563013544-824ae1b704d3?w=600&h=350&fit=crop', demo:'https://demo.creedforge.com/marketplace' }
        ];

        let currentFilter = 'all';
        let searchTerm = '';

        function filterProducts(category, btn) {
            currentFilter = category;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderProducts();
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => {
                const matchCategory = currentFilter === 'all' || p.category === currentFilter;
                const matchSearch = p.name.toLowerCase().includes(searchTerm) || p.category.toLowerCase().includes(searchTerm);
                return matchCategory && matchSearch;
            });
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div style="position:relative;">
                        <img class="product-img" src="${p.img}" alt="${p.name}" onerror="this.style.background='linear-gradient(45deg, #ec4899, #8b5cf6)'">
                        <div class="product-badge">🔥 Best Seller</div>
                        <div class="product-heart" onclick="event.stopPropagation(); this.style.color='var(--pink)'">♡</div>
                    </div>
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-rating">
                            <span class="stars">${'★'.repeat(Math.floor(p.rating))}${p.rating % 1 >= 0.5 ? '½' : ''}</span>
                            <span class="rating-text">${p.rating} (${p.orders} orders)</span>
                        </div>
                        <div class="product-price">৳ ${p.price.toLocaleString()}</div>
                        <div class="product-footer">
                            <button class="btn-view" onclick="openProductModal(${p.id})">View Details</button>
                            <a href="order.html?ref=${refCode}&product=${p.id}" class="btn-order">Order Now</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openProductModal(productId) {
            const p = allProducts.find(pr => pr.id === productId);
            if (!p) return;
            document.getElementById('modalProductName').textContent = p.name;
            document.getElementById('modalProductDesc').textContent = p.desc;
            document.getElementById('modalProductPrice').textContent = '৳ ' + p.price.toLocaleString();
            document.getElementById('modalDemoLink').href = p.demo;
            document.getElementById('modalFeatures').textContent = p.features.join(', ');
            document.getElementById('modalDelivery').textContent = p.delivery;
            document.getElementById('productModal').classList.add('active');
        }
        function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }

        // Initial render
        renderProducts();
    </script>
</body>
</html>
