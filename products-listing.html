<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreedForge - Products</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0a0f; --pink: #ec4899; --blue: #06b6d4; --text: #ffffff; --text-secondary: #94a3b8; --card-bg: #1a1a2e; --border: #1e293b; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
        .logo { text-align: center; font-size: 26px; font-weight: 800; margin-bottom: 32px; display: block; text-decoration: none; color: white; }
        .logo-highlight { background: linear-gradient(135deg, #ec4899, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero { text-align: center; padding: 40px 0; }
        .hero-badge { display: inline-block; padding: 6px 18px; border-radius: 50px; background: rgba(236,72,153,0.1); border: 1px solid rgba(236,72,153,0.3); color: #f9a8d4; font-size: 14px; margin-bottom: 20px; }
        .hero-title { font-size: 36px; font-weight: 800; margin-bottom: 12px; }
        .gradient-text { background: linear-gradient(135deg, #ec4899, #06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-subtitle { color: var(--text-secondary); max-width: 600px; margin: 0 auto 24px; }
        .search-filter { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
        .search-box { flex: 1; min-width: 250px; position: relative; }
        .search-box input { width: 100%; padding: 12px 16px 12px 40px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 12px; color: white; outline: none; font-size: 14px; }
        .filter-buttons { display: flex; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 18px; border: 1px solid var(--border); border-radius: 50px; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: 0.2s; font-family: inherit; }
        .filter-btn.active, .filter-btn:hover { background: var(--pink); color: white; border-color: var(--pink); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; }
        .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-6px); border-color: var(--pink); }
        .product-img { width: 100%; height: 180px; object-fit: cover; background: linear-gradient(45deg, rgba(236,72,153,0.2), rgba(6,182,212,0.2)); }
        .product-info { padding: 18px; flex: 1; display: flex; flex-direction: column; }
        .product-name { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
        .product-desc { color: var(--text-secondary); font-size: 13px; line-height: 1.4; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .product-price { font-size: 22px; font-weight: 700; color: var(--pink); margin-bottom: 12px; }
        .product-footer { display: flex; gap: 8px; margin-top: auto; }
        .btn-view, .btn-order { flex: 1; text-align: center; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; text-decoration: none; }
        .btn-view { border: 1px solid var(--border); background: transparent; color: var(--text); font-family: inherit; }
        .btn-view:hover { border-color: var(--pink); color: var(--pink); }
        .btn-order { background: var(--pink); color: white; border: none; }
        .btn-order:hover { background: #db2777; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 30px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-title { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        .modal-desc { color: var(--text-secondary); line-height: 1.5; margin-bottom: 16px; }
        .demo-link { color: var(--blue); text-decoration: underline; }
        .btn-close { margin-top: 16px; padding: 8px 22px; border: 1px solid var(--border); border-radius: 6px; background: transparent; color: white; cursor: pointer; font-family: inherit; }
        @media (max-width: 768px) { .hero-title { font-size: 28px; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="logo">⚡ Creed<span class="logo-highlight">Forge</span></a>
        <div class="hero">
            <div class="hero-badge">🚀 Trusted by 500+ Clients</div>
            <h1 class="hero-title">Build Your <span class="gradient-text">Dream Website</span> Today</h1>
            <p class="hero-subtitle">Choose from our handcrafted packages. Professional websites delivered fast.</p>
        </div>
        <div class="search-filter">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search products..." oninput="renderProducts()">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
                <button class="filter-btn" onclick="filterProducts('Web', this)">Web</button>
                <button class="filter-btn" onclick="filterProducts('E-commerce', this)">E-commerce</button>
            </div>
        </div>
        <div class="product-grid" id="productGrid"></div>
    </div>

    <div class="modal-overlay" id="productModal">
        <div class="modal-box">
            <div class="modal-title" id="modalProductName"></div>
            <div class="modal-desc" id="modalProductDesc"></div>
            <p style="margin-bottom:8px;"><strong>Price:</strong> <span id="modalProductPrice" style="color:var(--pink);"></span></p>
            <p><strong>Demo:</strong> <a href="#" target="_blank" id="modalDemoLink" class="demo-link">View Demo</a></p>
            <button class="btn-close" onclick="closeProductModal()">Close</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabase.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const refCode = urlParams.get('ref') || 'UNKNOWN';
        let allProducts = [];
        let currentFilter = 'all';

        async function loadProducts() {
            const { data } = await supabase.from('products').select('*').eq('status', 'active');
            allProducts = data || [];
            renderProducts();
        }

        function filterProducts(cat, btn) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderProducts();
        }

        function renderProducts() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => (currentFilter === 'all' || p.category === currentFilter) && p.name.toLowerCase().includes(search));
            document.getElementById('productGrid').innerHTML = filtered.map(p => `
                <div class="product-card">
                    ${p.image_url ? `<img class="product-img" src="${p.image_url}" alt="${p.name}">` : `<div class="product-img" style="background:linear-gradient(45deg, rgba(236,72,153,0.2), rgba(6,182,212,0.2));"></div>`}
                    <div class="product-info">
                        <div class="product-name">${p.name}</div>
                        <div class="product-desc">${p.description || ''}</div>
                        <div class="product-price">৳ ${(p.price||0).toLocaleString()}</div>
                        <div class="product-footer">
                            <button class="btn-view" onclick="openProductModal(${p.id})">View Details</button>
                            <a href="order.html?ref=${refCode}&product=${p.id}" class="btn-order">Order Now</a>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openProductModal(id) {
            const p = allProducts.find(pr => pr.id === id);
            if (!p) return;
            document.getElementById('modalProductName').textContent = p.name;
            document.getElementById('modalProductDesc').textContent = p.description || '';
            document.getElementById('modalProductPrice').textContent = '৳ ' + (p.price||0).toLocaleString();
            document.getElementById('modalDemoLink').href = p.demo_link || '#';
            document.getElementById('productModal').classList.add('active');
        }
        function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }

        loadProducts();
    </script>
</body>
</html>
