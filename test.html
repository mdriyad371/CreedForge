<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0a0f; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a2e; padding: 40px; border-radius: 16px; border: 1px solid #1e293b; max-width: 600px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h1 { margin-bottom: 24px; font-size: 28px; }
        .status { margin-bottom: 20px; font-size: 16px; }
        .success { color: #34d399; } .error { color: #f87171; }
        .btn { background: #ec4899; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-right: 10px; margin-top: 10px; }
        .btn:hover { background: #db2777; }
        input { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid #1e293b; border-radius: 8px; color: white; margin-bottom: 10px; }
        .hidden { display: none; }
        #results { margin-top: 20px; white-space: pre-wrap; word-break: break-word; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ CreedForge Supabase Test</h1>
        <p class="status" id="status">Connecting...</p>
        <div>
            <button class="btn" onclick="testFetchProducts()">Test Fetch Products</button>
            <button class="btn" onclick="testAdminLogin()">Test Admin Login</button>
        </div>
        <div id="signupSection" class="hidden" style="margin-top:20px;">
            <h3>Quick Signup Test</h3>
            <input type="email" id="testEmail" placeholder="Email">
            <input type="password" id="testPassword" placeholder="Password">
            <input type="text" id="testName" placeholder="Full Name">
            <button class="btn" onclick="testSignup()">Sign Up & Test</button>
        </div>
        <div id="results"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="supabase.js"></script>
    <script>
        const statusEl = document.getElementById('status');
        const resultsEl = document.getElementById('results');

        function showResult(text) {
            resultsEl.innerText = text;
        }

        // 1. On load, test connection by checking supabase object
        (async () => {
            if (typeof supabase === 'undefined') {
                statusEl.innerHTML = '<span class="error">❌ Supabase client not loaded. Check config.js and supabase.js.</span>';
                return;
            }
            statusEl.innerHTML = '<span class="success">✅ Supabase client loaded.</span>';
            // Test by fetching settings (which should have 1 row)
            const { data, error } = await supabase.from('settings').select('*');
            if (error) {
                statusEl.innerHTML += '<br><span class="error">❌ Settings fetch error: ' + error.message + '. Check if settings table exists and RLS allows public read (we added admin-only policy, but settings has a default row).</span>';
                // For testing, we can just try to get any data from a table that might be empty but exists
                const { error: err2 } = await supabase.from('products').select('*').limit(0);
                if (err2) {
                    statusEl.innerHTML += '<br><span class="error">❌ Products fetch error: ' + err2.message + '. Maybe tables not created.</span>';
                } else {
                    statusEl.innerHTML += '<br><span class="success">✅ Products table accessible.</span>';
                }
            } else {
                statusEl.innerHTML += '<br><span class="success">✅ Connected! Settings loaded.</span>';
                // Show signup section
                document.getElementById('signupSection').classList.remove('hidden');
            }
        })();

        // Test fetching all active products
        async function testFetchProducts() {
            showResult('Fetching products...');
            const { data, error } = await supabase.from('products').select('*').eq('status', 'active');
            if (error) {
                showResult('Error: ' + error.message);
            } else {
                if (data.length === 0) {
                    showResult('✅ Products table works, but no products found. You can add some via admin panel.');
                } else {
                    showResult('✅ Products loaded:\n' + JSON.stringify(data, null, 2));
                }
            }
        }

        // Test admin login with the default credentials (must exist in auth.users + profiles)
        async function testAdminLogin() {
            showResult('Attempting admin login...');
            const { data, error } = await supabase.auth.signInWithPassword({
                email: 'admin@creedforge.com',
                password: 'Admin@123'
            });
            if (error) {
                showResult('❌ Admin login failed: ' + error.message + '\n\nMake sure you ran the SQL with the admin user creation.');
            } else {
                // Verify profile
                const { data: profile } = await supabase.from('profiles').select('role, approval_status').eq('id', data.user.id).single();
                if (profile && profile.role === 'admin' && profile.approval_status === 'approved') {
                    showResult('✅ Admin login success! Role: ' + profile.role + ', Status: ' + profile.approval_status);
                } else {
                    showResult('⚠️ Login succeeded but admin profile missing or not approved. Check profiles table.');
                }
                // Sign out after test
                await supabase.auth.signOut();
            }
        }

        // Quick signup test
        async function testSignup() {
            const email = document.getElementById('testEmail').value.trim();
            const password = document.getElementById('testPassword').value;
            const name = document.getElementById('testName').value.trim();
            if (!email || !password || !name) return alert('Fill all fields');
            showResult('Signing up...');
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) {
                showResult('Signup error: ' + error.message);
                return;
            }
            if (data.user) {
                // Insert profile
                const { error: profileError } = await supabase.from('profiles').insert([{ id: data.user.id, name, role: 'volunteer', approval_status: 'pending' }]);
                if (profileError) {
                    showResult('Signup OK but profile insert error: ' + profileError.message);
                } else {
                    showResult('✅ Signup successful! Check your profiles table (status: pending).');
                }
                await supabase.auth.signOut();
            }
        }
    </script>
</body>
      </html>
