<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Real Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b0a0f; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a2e; padding: 40px; border-radius: 16px; border: 1px solid #1e293b; max-width: 700px; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h1 { margin-bottom: 24px; }
        .status { margin-bottom: 20px; font-size: 16px; }
        .success { color: #34d399; } .error { color: #f87171; }
        .btn { background: #ec4899; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; margin: 8px; }
        .btn:hover { background: #db2777; }
        #results { margin-top: 20px; white-space: pre-wrap; word-break: break-word; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; }
        input { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid #1e293b; border-radius: 8px; color: white; margin-bottom: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ Supabase Connection Test</h1>
        <p id="connectionStatus" class="status">Initializing...</p>
        <div>
            <button class="btn" onclick="testFetchProducts()">📦 Fetch Products</button>
            <button class="btn" onclick="testAdminLogin()">👑 Test Admin Login</button>
        </div>
        <div style="margin-top:20px;">
            <input type="email" id="testEmail" placeholder="Email for signup">
            <input type="password" id="testPassword" placeholder="Password">
            <input type="text" id="testName" placeholder="Full Name">
            <button class="btn" onclick="testSignup()">✍️ Test Signup</button>
        </div>
        <div id="results"></div>
    </div>

    <!-- Supabase JS library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ====== সরাসরি Supabase কনফিগ (আগের config.js থেকে) ======
        const SUPABASE_URL = "https://svqlcgopcercyzfvdfra.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2cWxjZ29wY2VyY3l6ZnZkZnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4OTk4NTQsImV4cCI6MjA5MzQ3NTg1NH0.D29O3ScZi5y0HmMLsAnlnpYjRnqz6q39-vQ8v0_2y7A";

        // Supabase client তৈরি
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const connectionStatus = document.getElementById('connectionStatus');
        const resultsEl = document.getElementById('results');

        function showResult(text) {
            resultsEl.innerText = text;
        }

        // প্রথমেই কানেকশন টেস্ট (settings টেবিল থেকে ডেটা পড়া)
        (async () => {
            try {
                const { data, error } = await supabase.from('settings').select('*').single();
                if (error) {
                    connectionStatus.innerHTML = '<span class="error">❌ Data fetch error: ' + error.message + '</span>';
                    // যদি settings টেবিল না থাকে, তাহলে products টেবিলও চেক করি
                    const { error: err2 } = await supabase.from('products').select('*').limit(0);
                    if (err2) {
                        connectionStatus.innerHTML += '<br><span class="error">❌ Products table also not accessible. Tables may not exist.</span>';
                    } else {
                        connectionStatus.innerHTML += '<br><span class="success">✅ Products table exists (but settings table returned error).</span>';
                    }
                } else {
                    connectionStatus.innerHTML = '<span class="success">✅ Connection Successful! Settings loaded.</span>';
                }
                // Auth state?
                const { data: userData } = await supabase.auth.getSession();
                if (userData.session) {
                    connectionStatus.innerHTML += '<br>🔐 Currently logged in as ' + userData.session.user.email;
                } else {
                    connectionStatus.innerHTML += '<br>👤 No user logged in.';
                }
            } catch (e) {
                connectionStatus.innerHTML = '<span class="error">❌ Unexpected error: ' + e.message + '</span>';
            }
        })();

        // ========== ফাংশনগুলো ==========
        async function testFetchProducts() {
            showResult('Fetching active products...');
            const { data, error } = await supabase.from('products').select('*').eq('status', 'active');
            if (error) {
                showResult('❌ Error: ' + error.message);
            } else {
                if (data.length === 0) {
                    showResult('✅ Table works, but no active products found.\nAdd products from admin panel or SQL.');
                } else {
                    showResult('✅ Active products:\n' + JSON.stringify(data, null, 2));
                }
            }
        }

        async function testAdminLogin() {
            showResult('Logging in as admin...');
            const { data, error } = await supabase.auth.signInWithPassword({
                email: 'admin@creedforge.com',
                password: 'Admin@123'
            });
            if (error) {
                showResult('❌ Admin login failed: ' + error.message + '\n\nMake sure the admin user exists (run SQL).');
                return;
            }
            const { data: profile } = await supabase.from('profiles').select('role, approval_status').eq('id', data.user.id).single();
            if (profile && profile.role === 'admin' && profile.approval_status === 'approved') {
                showResult('✅ Admin logged in! Role: ' + profile.role + ', Status: ' + profile.approval_status);
            } else {
                showResult('⚠️ Login OK, but admin profile not found or not approved.');
            }
            // সাইনআউট করে পরিস্কার করি
            await supabase.auth.signOut();
        }

        async function testSignup() {
            const email = document.getElementById('testEmail').value.trim();
            const password = document.getElementById('testPassword').value;
            const name = document.getElementById('testName').value.trim();
            if (!email || !password || !name) return alert('Fill all fields');
            showResult('Signing up...');
            const { data, error } = await supabase.auth.signUp({ email, password });
            if (error) { showResult('❌ Signup error: ' + error.message); return; }
            if (data.user) {
                const { error: profileError } = await supabase.from('profiles').insert([{
                    id: data.user.id,
                    name: name,
                    role: 'volunteer',
                    approval_status: 'pending'
                }]);
                if (profileError) {
                    showResult('⚠️ Signup OK, but profile insert error: ' + profileError.message);
                } else {
                    showResult('✅ Signup successful! User ID: ' + data.user.id + '\nProfile status: pending.');
                }
                await supabase.auth.signOut();
            }
        }
    </script>
</body>
</html>
