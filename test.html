<!DOCTYPE html>
<html>
<head><title>Supabase Connection Test</title></head>
<body>
<h1>Supabase Test</h1>
<pre id="output">Checking...</pre>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
  
  // বিল্ড টাইমে প্রতিস্থাপিত হওয়ার কথা
  const supabaseUrl = process.env.NEXT_PUBLIC_SUPABASE_URL;
  const supabaseKey = process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY;
  
  const out = document.getElementById('output');
  if (!supabaseUrl || !supabaseKey) {
    out.innerText = '❌ Environment variables are missing. Please set NEXT_PUBLIC_SUPABASE_URL and NEXT_PUBLIC_SUPABASE_ANON_KEY in Vercel.';
  } else {
    out.innerText = `URL: ${supabaseUrl}\nKey: ${supabaseKey.substring(0, 20)}...\n\nTesting connection...`;
    const supabase = createClient(supabaseUrl, supabaseKey);
    const { data, error } = await supabase.from('users').select('count', { count: 'exact', head: true });
    if (error) out.innerText += `\n❌ Error: ${error.message}`;
    else out.innerText += `\n✅ Connected! Users table exists.`;
  }
</script>
</body>
</html>
